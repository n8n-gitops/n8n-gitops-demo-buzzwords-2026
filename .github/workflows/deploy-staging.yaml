name: n8n Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install n8n-gitops
        run: pip install n8n-gitops

      - name: Validate before deploy
        run: n8n-gitops validate --strict
        env:
          N8N_BASE_URL: ${{ secrets.N8N_STAGING_URL }}
          N8N_API_KEY: ${{ secrets.N8N_STAGING_API_KEY }}

      - name: Deploy to staging
        run: n8n-gitops deploy --git-ref ${{ github.ref_name }}
        env:
          N8N_BASE_URL: ${{ secrets.N8N_STAGING_URL }}
          N8N_API_KEY: ${{ secrets.N8N_STAGING_API_KEY }}